<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Portfolio</title>

    <meta name="description" content="Contact Mokshagna Bandlamudi through this accessible contact form.">
</head>
<body>

<header>
    <h1>Contact Me</h1>

    <nav aria-label="Main Navigation">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="contact.html" aria-current="page">Contact</a></li>
        </ul>
    </nav>
</header>

<main>

<section aria-labelledby="contact-heading">

<h2 id="contact-heading">Send a Message</h2>

<form role="form" aria-label="Contact Form">

    <label for="name">Full Name</label>
    <input
        type="text"
        id="name"
        name="name"
        required
        aria-required="true">

    <br><br>

    <label for="email">Email Address</label>
    <input
        type="email"
        id="email"
        name="email"
        required
        aria-required="true">

    <br><br>

    <label for="message">Message</label>

    <textarea
        id="message"
        name="message"
        rows="5"
        required
        aria-required="true">
    </textarea>

    <br><br>

    <button type="submit">
        Submit
    </button>

</form>

</section>

</main>

<footer>
    <p>&copy; 2026 Mokshagna Bandlamudi</p>
</footer>

</body>
</html>
